name: USGS health check

# A7 (SLICES.md). Independent of sitrep.yml and of every other feed's
# health-check workflow -- pings one feed and updates only its own health
# file. Disjoint from sitrep.yml's files (state/incidents.json,
# dashboard.html) and from health-check-gdacs.yml's, so none of these
# workflows' commits can ever collide (SHAPING.md A4.3).

on:
  workflow_dispatch: {}

concurrency:
  group: health-check-usgs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run health-check -- usgs

      - name: Commit and push (A7.3)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/health-usgs.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: usgs health check $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
