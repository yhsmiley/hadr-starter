name: Morning sitrep

# Implements the shape .github/workflows/sitrep.yml.disabled specified:
#   1. a deterministic script decides whether anything changed;
#   2. a headless model call runs only if it did.
# The model never decides whether to wake up -- scripts/sitrep.ts (step
# "fuse" below) makes that call in code, and exposes it as a step output.

on:
  schedule:
    - cron: "30 0 * * *" # 08:30 SGT (UTC+8) -- A1.1
  workflow_dispatch: {}

concurrency:
  group: sitrep-daily
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # required by anthropics/claude-code-action to mint its OIDC token
  pull-requests: read
  issues: read
  actions: read

jobs:
  sitrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # A1.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # TODO 1 (done): ingest, fuse, write state, render a first pass of
      # dashboard.html, and signal whether any Incident needs narrating.
      - name: Ingest and fuse
        id: fuse
        run: npm run sitrep

      # TODO 2 (done): headless Claude runs the sitrep skill, only if step
      # "fuse" found an Incident with a pending narrative.
      - name: Narrate via sitrep skill
        if: steps.fuse.outputs.needs_narration == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/sitrep"
          # Headless mode has no interactive approval prompt, so tools
          # default to denied -- without this the skill can only look,
          # never act (confirmed live: 16/16 tool calls denied, "success"
          # reported anyway since Claude gave up gracefully rather than
          # erroring). Scoped to exactly what skills/sitrep/SKILL.md does:
          # read + edit state/incidents.json, then run the one render
          # command -- nothing broader.
          claude_args: |
            --allowedTools "Read,Edit,Bash(npm run render:*)"

      - name: Commit and push (A4.2)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # anthropics/claude-code-action reconfigures git credentials for
          # its own OIDC flow and doesn't restore actions/checkout's
          # token-based auth afterwards -- re-authenticate explicitly
          # rather than relying on ambient credential state surviving a
          # step that has no reason to preserve it.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add state/incidents.json state/raw dashboard.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update sitrep $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
