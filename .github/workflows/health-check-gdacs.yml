name: GDACS health check

# A7 (SLICES.md V2). Independent of sitrep.yml and health-check-usgs.yml
# -- pings only GDACS and updates only its own health file (SHAPING.md
# A4.3), on GDACS's own latency tier (ADR 0007: hourly, triage-tier) --
# not USGS's every-few-minutes cadence.

on:
  schedule:
    - cron: "0 * * * *" # hourly -- ADR 0007's GDACS cadence
  workflow_dispatch: {}

concurrency:
  group: health-check-gdacs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run health-check -- gdacs

      - name: Commit and push (A7.3)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/health-gdacs.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: gdacs health check $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
